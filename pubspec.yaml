name: vocab_store
description: A vocabulary learning app with Firebase backend.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.32.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.17.5
  google_sign_in: ^6.2.1
  provider: ^6.1.1
  flutter_animate: ^4.5.0
  lottie: ^3.0.0
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  google_fonts: ^6.1.0
  flutter_staggered_animations: ^1.1.1
  confetti: ^0.7.0
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  flutter_tts: ^4.0.2
 
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
